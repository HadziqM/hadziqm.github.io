<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>Hadziq The Hunter</title>
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">Hadziq</a>
      </nav>
    </header>
    <div class="container">
        <table class="table table-blue">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">a</th>
                <th scope="col">b</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">1</th>
                <td><input id="numb"></td>
                <td><input id="numb1"></td>
              </tr>
              <tr>
                <th scope="row">2</th>
                <td><input id="numb2"></td>
                <td><input id="numb3"></td>
              </tr>
            </tbody>
          </table>
          <button type="button" onclick="myFunction()">Submit</button>
          <table class="table table-blue">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">Eighen value</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">X1</th>
                <td><p id="demo"></p></td>
              </tr>
              <tr>
                <th scope="row">X2</th>
                <td><p id="demo1"></p></td>
              </tr>
            </tbody>
          </table>
          <p id="demo"></p>
  </div>
    <hr class="featurette-divider">
    <footer class="container">
        © 2022 wkwkwk Lincense 
        <a href="#">Privacy</a>
         · 
         <a href="#">Terms</a>
        </p>
    </footer>
    <script>
        function myFunction() {
          let a = parseInt(document.getElementById("numb").value);
          let b = parseInt(document.getElementById("numb2").value);
          let c = parseInt(document.getElementById("numb1").value);
          let d = parseInt(document.getElementById("numb3").value);
          let q = Math.sqrt((a+d)*(a+d)-4*(a*d-b*c))/2;
          let x = (a+d)/2 + q;
          let y = (a+d)/2 - q;
          document.getElementById("demo").innerHTML = x;
          document.getElementById("demo1").innerHTML = y;
        }
        </script>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js,Bootstrap JS, SQL.JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.7.0/sql-wasm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.0/FileSaver.js"></script>
  </body>
</html>
